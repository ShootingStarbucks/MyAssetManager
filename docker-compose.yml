services:
  app:
    image: myasset-manager:latest
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    mem_limit: 512m
    mem_reservation: 256m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
