name: Deploy to OCI

on:
  pull_request:
    branches:
      - release/**
    types:
      - closed

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t myasset-manager:latest .

      - name: Save Docker image as tar.gz
        run: |
          docker save myasset-manager:latest | gzip > myasset-manager.tar.gz

      - name: Upload image to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          source: myasset-manager.tar.gz
          target: ~/

      - name: Run deploy script via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            bash ~/deploy.sh
